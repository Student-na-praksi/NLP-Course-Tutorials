name: Sync fork from laspp/HPC

on:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC
  workflow_dispatch: {} # allows manual run

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork from laspp/HPC
        env:
          UPSTREAM_REPO: laspp/HPC
          UPSTREAM_BRANCH: main
          FORK_BRANCH: main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          git checkout "${FORK_BRANCH}"
          # Try strict fast-forward first. If fork has extra commits (e.g. workflow files),
          # rebase them on top of upstream so fork is no longer behind.
          if git merge --ff-only --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            echo "Fast-forward sync completed"
          else
            echo "Fast-forward not possible; rebasing fork commits onto upstream"
            git rebase --no-edit "upstream/${UPSTREAM_BRANCH}"
          fi

          # Rebase rewrites commit IDs, so use --force-with-lease for safe update.
          git push --force-with-lease origin "${FORK_BRANCH}"
